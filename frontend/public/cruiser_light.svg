<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Hull -->
  <path d="M40 120 Q60 108 90 108 L340 108 L360 120 L350 148 L60 148 Z" fill="#c8d4e0"/>
  <!-- Main deck -->
  <rect x="70" y="98" width="280" height="12" fill="#adbccc"/>
  <!-- Bow gun -->
  <rect x="75" y="88" width="35" height="11" rx="3" fill="#8a9fb5"/>
  <rect x="65" y="91" width="12" height="5" rx="1" fill="#8a9fb5"/>
  <!-- Forward superstructure -->
  <rect x="145" y="75" width="55" height="25" fill="#9aafc2"/>
  <rect x="155" y="62" width="18" height="14" fill="#8a9fb5"/>
  <rect x="176" y="65" width="15" height="12" fill="#8a9fb5"/>
  <!-- Radar dome -->
  <ellipse cx="164" cy="62" rx="8" ry="6" fill="#8a9fb5"/>
  <!-- Mast -->
  <line x1="164" y1="56" x2="164" y2="30" stroke="#6a8099" stroke-width="2"/>
  <line x1="153" y1="42" x2="180" y2="42" stroke="#6a8099" stroke-width="1.5"/>
  <!-- Aft superstructure -->
  <rect x="220" y="78" width="50" height="22" fill="#9aafc2"/>
  <rect x="228" y="68" width="15" height="12" fill="#8a9fb5"/>
  <!-- Aft gun -->
  <rect x="280" y="90" width="35" height="11" rx="3" fill="#8a9fb5"/>
  <rect x="312" y="93" width="12" height="5" rx="1" fill="#8a9fb5"/>
  <!-- Cross marking on hull -->
  <line x1="330" y1="122" x2="330" y2="132" stroke="#6a8099" stroke-width="2"/>
  <line x1="325" y1="127" x2="335" y2="127" stroke="#6a8099" stroke-width="2"/>
  <!-- Railing -->
  <line x1="70" y1="108" x2="342" y2="108" stroke="#adbccc" stroke-width="1" opacity="0.6"/>
  <!-- Label -->
  <text x="200" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4a6a85" letter-spacing="3">CRUISER</text>
</svg>
